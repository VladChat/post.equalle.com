# ============================================================
# File: .github/workflows/rss-to-pinterest.yml
# Purpose:
#   - Read blog RSS feed
#   - Post next unpublished article to a Pinterest board
# ============================================================

name: RSS → Pinterest Pin

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 17 * * 2,5"

permissions:
  contents: write

jobs:
  post-to-pinterest:
    runs-on: ubuntu-latest

    env:
      BLOG_RSS_URL: https://blog.equalle.com/index.xml

      # User OAuth (eQualle publishing): access token comes from the
      # continuous refresh token; dashboard-generated static tokens are
      # read-only and cannot create Pins.
      PINTEREST_CLIENT_ID_EQUALLE: ${{ secrets.PINTEREST_CLIENT_ID_EQUALLE }}
      PINTEREST_CLIENT_SECRET_EQUALLE: ${{ secrets.PINTEREST_CLIENT_SECRET_EQUALLE }}
      PINTEREST_REFRESH_TOKEN_EQUALLE: ${{ secrets.PINTEREST_REFRESH_TOKEN_EQUALLE }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r blog-equalle/requirements.txt

      - name: Run Pinterest poster
        env:
          # Pinterest rotates the continuous refresh token on each refresh;
          # the poster writes the new value here (never logged).
          PINTEREST_ROTATED_REFRESH_TOKEN_FILE: ${{ runner.temp }}/pinterest_rotated_refresh_token
        run: |
          python blog-equalle/main_pinterest.py

      # The rotated refresh token must replace the stored secret or it will
      # expire again. GITHUB_TOKEN cannot write repo secrets, so this uses an
      # optional fine-grained PAT (GH_SECRETS_ADMIN_TOKEN with "Secrets: write"
      # on this repo). Without it, the step only warns — the token value is
      # never printed, committed, or uploaded.
      - name: Persist rotated Pinterest refresh token
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ secrets.GH_SECRETS_ADMIN_TOKEN }}
          ROTATED_FILE: ${{ runner.temp }}/pinterest_rotated_refresh_token
        run: |
          if [ ! -s "$ROTATED_FILE" ]; then
            echo "No rotated refresh token to persist."
            exit 0
          fi
          if [ -n "$GH_TOKEN" ]; then
            gh secret set PINTEREST_REFRESH_TOKEN_EQUALLE --repo "$GITHUB_REPOSITORY" < "$ROTATED_FILE"
            echo "PINTEREST_REFRESH_TOKEN_EQUALLE updated with the rotated token."
          else
            echo "::warning title=Pinterest refresh token rotated::Pinterest issued a rotated refresh token but GH_SECRETS_ADMIN_TOKEN is not configured. Re-run the OAuth login helper (blog-equalle/social/pinterest_oauth.py) and update the PINTEREST_REFRESH_TOKEN_EQUALLE secret before the stored token expires. The token value was NOT logged."
          fi
          rm -f "$ROTATED_FILE"

      - name: Commit updated state.json (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git status --porcelain | grep "blog-equalle/state/state.json"; then
            git add blog-equalle/state/state.json
            git commit -m "Update Pinterest post state [skip ci]" || echo "Nothing to commit"
            git push
          else
            echo "No state changes."
          fi
